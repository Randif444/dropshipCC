<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="800" height="800" fill="#ffffff"/>

  <!-- Black rounded square container — heavy rounding like iOS icon -->
  <rect x="140" y="140" width="520" height="520" rx="118" ry="118" fill="#0a0a0a"/>

  <!-- White icon: Command Hub symbol -->
  <!-- Central data-point square at bottom (base node) -->
  <rect x="364" y="502" width="72" height="72" rx="10" ry="10" fill="none" stroke="#ffffff" stroke-width="22" stroke-linejoin="round"/>

  <!-- Vertical stem from base node upward -->
  <line x1="400" y1="502" x2="400" y2="408" stroke="#ffffff" stroke-width="22" stroke-linecap="round"/>

  <!-- Horizontal crossbar at top of stem -->
  <line x1="270" y1="408" x2="530" y2="408" stroke="#ffffff" stroke-width="22" stroke-linecap="round"/>

  <!-- Three radiating upward lines from crossbar -->
  <!-- Left line -->
  <line x1="270" y1="408" x2="270" y2="318" stroke="#ffffff" stroke-width="22" stroke-linecap="round"/>
  <!-- Center line -->
  <line x1="400" y1="408" x2="400" y2="318" stroke="#ffffff" stroke-width="22" stroke-linecap="round"/>
  <!-- Right line -->
  <line x1="530" y1="408" x2="530" y2="318" stroke="#ffffff" stroke-width="22" stroke-linecap="round"/>

  <!-- Three node dots at top of each radiating line -->
  <circle cx="270" cy="298" r="22" fill="#ffffff"/>
  <circle cx="400" cy="298" r="22" fill="#ffffff"/>
  <circle cx="530" cy="298" r="22" fill="#ffffff"/>

  <!-- Small arc above center node — radar pulse / signal -->
  <path d="M 348 254 A 60 60 0 0 1 452 254" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round"/>
  <path d="M 318 224 A 90 90 0 0 1 482 224" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" opacity="0.55"/>
</svg>
